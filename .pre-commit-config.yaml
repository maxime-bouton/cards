# pre-commit list available at https://pre-commit.com/
repos:
  # * commit formatting
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
        - id: commitlint
          stages: [commit-msg]
  # * code formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.6
    hooks:
      # Run the linter.
      - id: ruff
        types_or: [ python ]
        args:
          - "--fix"
          - "--extend-exclude=dev/*"
      # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi, jupyter ]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-json
        # exclude: ^(.vscode/|other/folder/) # weird errors with .vscode/*.json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: ^((.*)\.(ipynb|otherext)) # avoid reformat notebooks everytime
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/myint/rstcheck
    rev: v6.2.4
    hooks:
      - id: rstcheck
        args: [
            # "--report",
            # "info",
            "--ignore-directives",
            "autofunction,automodule,bibliography,math,numfig,plot,testcode,testoutput",
            "--ignore-roles",
            "eq,cite",
          ]
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        args: [--number]
        additional_dependencies:
        - mdformat-gfm
        - mdformat-black
